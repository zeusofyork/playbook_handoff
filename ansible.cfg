[defaults]
inventory          = inventory/
roles_path         = roles/
host_key_checking  = False
stdout_callback    = yaml
forks              = 25
gathering          = explicit
retry_files_enabled = False
deprecation_warnings = False
# AAP injects credentials as env vars; localhost interpreter must be the one
# with azure-cli / azure-identity in its site-packages.
interpreter_python = auto_silent

[inventory]
enable_plugins = azure.azcollection.azure_rm
cache          = True
cache_plugin   = jsonfile
cache_timeout  = 300
cache_connection = /tmp/.ansible_azure_inv_cache
